# spring.profiles.active=dev

spring.application.name=backend
server.port=${SERVER_PORT:8036}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA 설정
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 브라우저에서 접근할 URL 패턴
spring.mvc.static-path-pattern=/**

# 실제 이미지가 저장된 물리적 경로 (마지막에 / 필수)
spring.web.resources.static-locations=file:./upload/, classpath:/static/

# Security 설정
spring.security.user.name=${SPRING_SECURITY_USER:admin}
spring.security.user.password=${SPRING_SECURITY_PASSWORD}

# JWT 설정
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:3600000}