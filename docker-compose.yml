services:
  backend:
    image: ${BACKEND_IMAGE:-ncafe-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${USER_ID:-kang}-backend
    #ports:
      # - "${BACKEND_PORT:-8036}:8080"
    volumes:
      - ./backend-upload:/app/upload
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
    restart: unless-stopped
    depends_on:
      - db

  frontend:
    image: ${FRONTEND_IMAGE:-ncafe-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${USER_ID:-kang}-frontend
    ports:
      - "${FRONTEND_PORT:-3036}:3036"
    environment:
      - API_BASE_URL=http://backend:8080
      - SESSION_SECRET=${SESSION_SECRET:-JQvH/BoClMe32u3gbIXxmf+VBxRisvakVC/HbrihT+s=}
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:17
    profiles: [ "with-db" ]
    container_name: ${USER_ID:-kang}-db
    environment:
      POSTGRES_DB: ${SPRING_DATASOURCE_DB:-mydb}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    #ports:
      # - "${DB_PORT:-5436}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db-data:
    name: ${USER_ID:-kang}-db-data
