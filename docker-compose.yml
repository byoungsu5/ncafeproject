services:
  backend:
    image: ${BACKEND_IMAGE:-ncafe-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${USER_ID:-kang}-backend
    # expose:
    #   - "8080"
    volumes:
      - upload-data:/app/upload
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - INITIAL_DATA_PASSWORD=${INITIAL_DATA_PASSWORD:-1234}
      - PAYMENT_SUCCESS_URL=${FRONTEND_BASE_URL:-https://kang.newlecture.com}/orders/success
      - PAYMENT_FAIL_URL=${FRONTEND_BASE_URL:-https://kang.newlecture.com}/orders/fail
      - PAYMENT_CANCEL_URL=${FRONTEND_BASE_URL:-https://kang.newlecture.com}/orders/cancel
    restart: unless-stopped
    depends_on:
      - db

  frontend:
    image: ${FRONTEND_IMAGE:-ncafe-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${USER_ID:-kang}-frontend
    ports:
      - "${FRONTEND_PORT:-3036}:3036"
    environment:
      - API_BASE_URL=http://backend:8080
      - SESSION_SECRET=${SESSION_SECRET:-JQvH/BoClMe32u3gbIXxmf+VBxRisvakVC/HbrihT+s=}
      - AI_AGENT_URL=http://ai-agent:8000
      - NEXT_PUBLIC_AI_API_URL=${NEXT_PUBLIC_AI_API_URL:-/api/ai}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:3036}
    depends_on:
      - backend
      - ai-agent
    restart: unless-stopped

  ai-agent:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile
    container_name: ${USER_ID:-kang}-ai-agent
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${SPRING_DATASOURCE_DB:-mydb}
      - DB_USER=${SPRING_DATASOURCE_USERNAME}
      - DB_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
    depends_on:
      - db
    #expose:
    #  - "8000"
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg17
    container_name: ${USER_ID:-kang}-db
    environment:
      POSTGRES_DB: ${SPRING_DATASOURCE_DB:-mydb}
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    #expose:
    #  - "5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db-data:
    name: ${USER_ID:-kang}-db-data
  upload-data:
    name: ${USER_ID:-kang}-upload-data
