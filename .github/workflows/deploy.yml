name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Reset DB volume (password mismatch fix)
        run: |
          docker compose down 2>/dev/null || true
          docker volume rm kang-db-data 2>/dev/null || true
          echo "DB volume removed - will reinitialize with correct password"
        continue-on-error: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}" > .env
          echo "USER_ID=${USER_ID}" >> .env
          echo "FRONTEND_PORT=${FRONTEND_PORT}" >> .env
          echo "SESSION_SECRET=${SESSION_SECRET}" >> .env
          echo "SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}" >> .env
          echo "SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}" >> .env
          echo "SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}" >> .env
          echo "JWT_SECRET=${JWT_SECRET}" >> .env
          echo "JWT_EXPIRATION=${JWT_EXPIRATION:-3600000}" >> .env
          echo "INITIAL_DATA_PASSWORD=${INITIAL_DATA_PASSWORD}" >> .env
        env:
          COMPOSE_PROJECT_NAME: ${{ secrets.COMPOSE_PROJECT_NAME }}
          USER_ID: ${{ secrets.USER_ID }}
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          SPRING_DATASOURCE_URL: ${{ vars.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ vars.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION: ${{ vars.JWT_EXPIRATION }}
          INITIAL_DATA_PASSWORD: ${{ secrets.INITIAL_DATA_PASSWORD }}

      - name: Build and Deploy
        run: docker compose up --build -d

      - name: Verify deployment
        run: |
          echo "=== Container Status ==="
          docker compose ps
          echo ""
          echo "=== Waiting for backend to start (30s) ==="
          for i in $(seq 1 30); do
            if curl -sf --max-time 2 http://localhost:${BACKEND_PORT:-8036}/api/menus > /dev/null 2>&1; then
              echo "Backend ready after ${i}s"
              break
            fi
            sleep 1
          done
          echo ""
          echo "=== Health Check ==="
          curl -sf --max-time 10 -o /dev/null -w "Frontend : HTTP %{http_code}\n" http://localhost:${FRONTEND_PORT:-3036} || echo "Frontend : not responding"
          curl --max-time 10 -o /dev/null -w "Backend  : HTTP %{http_code}\n" http://localhost:${BACKEND_PORT:-8036}/api/menus || echo "Backend  : not responding"
          echo ""
          echo "=== Backend Logs (last 30 lines) ==="
          docker compose logs backend --tail 30 2>&1 || true
        env:
          FRONTEND_PORT: ${{ vars.FRONTEND_PORT }}
          BACKEND_PORT: ${{ vars.BACKEND_PORT }}

      - name: Clean up old images
        run: docker image prune -f